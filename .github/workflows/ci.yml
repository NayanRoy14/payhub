name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - run: npm ci

      - name: Type-check
        run: npx tsc --noEmit -p tsconfig.json

      - name: Test
        run: npm test

      - name: Build server
        run: npm run build

      - name: Build SDK
        run: npm run build:sdk
