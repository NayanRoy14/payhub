services:
  - type: web
    name: payhub
    runtime: node
    plan: free
    # NODE_ENV=production (set below) is applied during the build step too,
    # which makes a plain `npm ci` skip devDependencies — including
    # typescript and the @types/* packages the build itself needs. Confirmed
    # locally: `NODE_ENV=production npm ci` installs 130 packages and omits
    # typescript entirely; `--include=dev` forces devDependencies in
    # regardless of NODE_ENV, so the build gets what it needs while the
    # running server still sees NODE_ENV=production.
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      # MongoDB Atlas connection string (free tier is enough). Set this in
      # the Render dashboard after the first deploy — never commit it.
      - key: MONGODB_URI
        sync: false
      # Razorpay TEST MODE credentials (dashboard.razorpay.com -> Test Mode -> API Keys)
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      # Cashfree TEST MODE credentials (merchant.cashfree.com -> Developers -> API Keys)
      - key: CASHFREE_ENV
        value: sandbox
      - key: CASHFREE_APP_ID
        sync: false
      - key: CASHFREE_SECRET_KEY
        sync: false
      # Stripe TEST MODE credentials — optional; StripeAdapter is implemented
      # but not the active routed processor (see README "Known limitations").
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      # Outbound webhooks to your own merchant backend — optional. Leave
      # unset and PayHub simply won't attempt delivery (see README "Outbound
      # merchant webhooks").
      - key: MERCHANT_WEBHOOK_URL
        sync: false
      - key: MERCHANT_WEBHOOK_SECRET
        sync: false
